<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyimbo Zone</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff416c, #1e90ff);
  color: white;
}

.arrow {
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  font-size: 24px;
  padding: 10px;
  cursor: pointer;
  border-radius: 50%;
}

.arrow:hover {
  background: black;
}

  .trending {
  display: flex;
  align-items: center;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
}

.trending::-webkit-scrollbar {
  display: none;
}

.trend-card {
  min-width: 200px;
  background: rgba(0,0,0,0.7);
  padding: 8px;
  border-radius: 12px;
  flex-shrink: 0;
}

.trend-card iframe {
  width: 100%;
  border-radius: 10px;
}

.trend-card p {
  font-size: 14px;
  margin-top: 5px;
}
  
header {
  text-align: center;
  padding: 20px;
  font-size: 30px;
  font-weight: bold;
}

.search-box {
  text-align: center;
  margin: 15px 0;
}

#searchInput {
  width: 85%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  outline: none;
  font-size: 16px;
}

.buttons {
  text-align: center;
  margin: 10px;
}

button {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  background: white;
  color: black;
  font-weight: bold;
}

.container {
  padding: 10px;
}

.card {
  background: rgba(0,0,0,0.7);
  padding: 12px;
  margin: 12px 0;
  border-radius: 15px;
}

iframe {
  width: 100%;
  border-radius: 10px;
}
</style>

</head>

<body>

<header>🎧 Nyimbo Zone</header>

<div class="search-box">
  <input type="text" id="searchInput" onkeyup="searchContent()" placeholder="Search videos or audio...">
</div>

<div class="buttons">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('amapiano')">Amapiano</button>
  <button onclick="filter('hiphop')">Hip-Hop</button>
  <button onclick="filter('trap')">Trap</button>
</div>

<div class="container">
  
  <h2>🔥 Trending</h2>

  <div class="trending">
    
    <button class="arrow left" onclick="scrollTrending(-1)">❮</button>

  <div class="trending" id="trendingBox">

    <!--TRENDING TOP 5 -->
    
    <div class="trend-card">
      <iframe height="120" src="https://www.youtube.com/embed/OpWM9-4l_qpSGSBF"></iframe>
      <p>Joe ikon - Venda</p>
    </div>

    <div class="trend-card">
      <iframe height="120" src="https://www.youtube.com/embed/ssYZnUyAqyg"></iframe>
      <p>currentkid - trouble maker</p>
    </div>

    <div class="trend-card">
      <iframe height="120" src="https://www.youtube.com/embed/Ut4CAQCX3nxMkbOT"></iframe>
      <p>Joe Ikon - Pang'ono'</p>
    </div>

  </div>
    <button class="arrow right" onclick="scrollTrending(1)">❯</button>
  </div>

 <!-- 🎵 AMAPIANO VIDEO LINKS START -->
  
  <div class="card" data-genre="amapiano">
    <h3>Joe Ikon ft Zeze - Limodzi</h3>
    <iframe height="200" src="https://www.youtube.com/embed/HopUlv5EaW8Js3pa"></iframe>
  </div>
  
  <div class="card" data-genre="amapiano">
    <h3>Currentkid - Trouble maker</h3>
    <iframe height="200" src="https://www.youtube.com/embed/ssYZnUyAqyg"></iframe>
  </div>
  
  <div class="card" data-genre="amapiano">
   <h3>Joe Ikon - Venda</h3>
    <iframe height="200" src="https://www.youtube.com/embed/OpWM9-4l_qpSGSBF"></iframe>
  </div>
  
  <div class="card" data-genre="amapiano">
   <h3>Fada Moti - Jump</h3>
    <iframe height="200" src="https://www.youtube.com/embed/18LZTDxnC8f5CCRg"></iframe>
  </div>

  <!-- 🎵 HIP-HOP VIDEO LINKS START -->
  
  <div class="card" data-genre="hiphop">
    <h3>Hyphen - Tiziti mwayiwala?</h3>
    <iframe height="200" src="https://www.youtube.com/embed/ygUMbWZ1bXUgaHlwaGVu"></iframe>
  </div>

  <div class="card" data-genre="hip-hop">
    <h3>Trap Audio</h3>
    <iframe height="120" src="https://audiomack.com/embed/150654717"></iframe>
  </div>

</div>

<script>
let currentGenre = "all";

function filter(genre) {
  currentGenre = genre;
  applyFilters();
}
  

function searchContent() {
  applyFilters();
}

function applyFilters() {
  let input = document.getElementById("searchInput").value.toLowerCase();
  let items = document.querySelectorAll(".card");

  items.forEach(item => {
    let text = item.innerText.toLowerCase();
    let genre = item.dataset.genre;

    let matchesGenre = (currentGenre === "all" || genre === currentGenre);
    let matchesSearch = text.includes(input);

    if (matchesGenre && matchesSearch) {
      item.style.display = "block";
    } else {
      item.style.display = "none";
    }
    
function scrollTrending(direction) {
  const container = document.getElementById("trendingBox");
  
  container.scrollBy({
    left: direction * 200,
    behavior: "smooth"
  });
}

  container.scrollLeft += direction * 220;
}
</script>

</body>
</html>
